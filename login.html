<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugbo Henyo Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./external-repo/login.css">
</head>

<body>
    <div class="box">
        <div class="box-top">
            <img src="./external-repo/images/logo.png" alt="logo">
            <h1>Sugbo<span>Henyo</span></h1>
            <p>Explore the rich history of Cebu</p>
        </div>

        <div class="box-middle">
            <form id="login-form">
                <label for="username">Username</label>
                <div class="input-box">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" id="username" placeholder="Enter your username">
                </div>

                <label for="password">Password</label>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>

                <button type="submit">Login to Start Adventure</button>
            </form>
        </div>

        <div class="box-bottom">
            <small>
                <p>New here? <a href="signup.html">Create an account</a> to start learning</p>
            </small>
        </div>
    </div>

    <script src="auth.js"></script>
</body>

</html>
