            <option 
                value="9.971533,123.404678" data-name="Alcantara" data-tagline="Home of the Bahandi Festival"
                data-history="Originally named 'Kugtong' after a legendary giant grouper found in local springs, Alcantara was a barrio of Moalboal before regaining independent status in 1912. It is the smallest municipality in Cebu by land area and is known for its cultural resilience and the Bahandi Festival, which honors St. Augustine of Hippo every August 28th."
                data-items="Corn, Coconuts, Fish, Mangroves"
                data-img="https://laruysugbo.com/wp-content/uploads/2019/04/alcantara-cebu-tourism-beaches-destinations.png"
                data-video="https://www.youtube.com/watch?v=HMdBlk5DSiA&list=RDHMdBlk5DSiA&start_radio=1">
                Alcantara
            </option>

            <option 
                value="9.708183,123.506042" data-name="Alcoy" data-tagline="Home of the Siloy Festival"
                data-history="Originally known as Mambaje, the town was established as a municipality in 1866 before being renamed Alcoy in 1869 and moving its seat of government to Hulomaynon. It is currently recognized for its vast dolomite deposits and its commitment to environmental preservation through the Siloy Festival, which honors the endemic Black Shama bird."
                data-items="Dolomite, Copra, Corn, Handwoven Baskets, Tingko Beach"
                data-img="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Explore_Alcoy.jpg/1920px-Explore_Alcoy.jpg"
                data-video="https://www.youtube.com/watch?v=JEr4_6127Jg">
                Alcoy
            </option>

            <option 
                value="9.724331,123.340244" data-name="Alegria" data-tagline="Home of the Que Alegre Festiva"
                data-history="Originally a barrio called Tuburan, the town was separated from Malabuyoc and established as a municipality in 1850 before being renamed Alegria to avoid confusion with other settlements. Its parish was canonically erected in 1857 under the patronage of St. Francis Xavier, eventually growing to include areas like Madridejos and becoming a prominent eco-tourism hub in South Cebu."
                data-items="Vegetables, Natural Gas, Fish, Coconuts"
                data-img="https://upload.wikimedia.org/wikipedia/commons/e/e2/Heritage_park_of_Alegria%2C_Cebu.jpg"
                data-video="https://www.youtube.com/watch?v=cAd0Lhmm7SA">
                Alegria
            </option>

            <option 
                value="10.222875,123.549069" data-name="Aloguinsan" data-tagline="Eco-Tourism Capital of Cebu"
                data-history="Created as a town by Royal Decree in 1886, Aloguinsan was formerly a barrio of Pinamungajan known for its historic 'Bulwarte' watchtower that defended against Moro attacks. It was also a site of fierce resistance during the American period and World War II, where local revolutionaries and guerrillas demonstrated great patriotism."
                data-items="Bojo River, Hermit's Cove, Farm-to-Table Food"
                data-img="https://www.mycebu.ph/wp-content/uploads/2015/08/aloguinsan-eco-tour-1-1.jpg"
                data-video="https://www.youtube.com/watch?v=29ceSSNotPY">
                Aloguinsan
            </option>

            <option 
                value="9.88,123.6" data-name="Argao" data-tagline="The Torta Capital of Cebu"
                data-history="Founded in 1608, Argao is a heritage-rich town known for its well-preserved Spanish-era stone church and town center. Its history is deeply intertwined with the 'La Torta' tradition and the legend of Maria Cacao, a goddess said to have provided the town with its abundant cacao trees."
                data-items="Torta, Tablea, Sukang Tubâ, Hablon Weaving"
                data-img="https://www.viewbug.com/media/mediafiles/2017/08/09/74370283_large1300.jpg"
                data-video="https://www.youtube.com/watch?v=ez5zim1x7H0">
                Argao
            </option>

            <option 
                value="10.567869,123.717194" data-name="Asturias" data-tagline="Home of the Lalin Festival"
                data-history="Originally called Naghalin, meaning 'settlers' or 'making fire,' the town was formed from parts of Tuburan and Balamban following a surge in immigration from neighboring islands. It was formally established as a pueblo in the late 19th century, an event notably witnessed by Antonio Alonso, the uncle of national hero José Rizal, in 1888."
                data-items="Bingka Dawa, Sugarcane, Panas Waterfalls"
                data-img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTVaYg_3hbsqrPUpkj0bhIgk3L0h0zpJ0V60Q&s"
                data-video="https://www.youtube.com/watch?v=_a0aiXfa11Y&list=RD_a0aiXfa11Y&start_radio=1">
                Asturias
            </option>

            <option 
                value="10.5048,123.7143" data-name="Balamban" data-tagline="The Shipbuilding Capital of the Philippines"
                data-history="Rooted in the pre-Hispanic polity of Hinulawan, Balamban was recognized as a pueblo by 1857 under Spanish administrator Ciriaco Gutierrez. The town is etched in national history as the site of the 1957 Mt. Manunggal plane crash that claimed the life of President Ramon Magsaysay, and has since evolved into a global industrial powerhouse and shipbuilding hub."
                data-items="Ships, Balamban Liempo, Buwakan ni Alejandra, Mt. Manunggal"
                data-img="https://i.ytimg.com/vi/NhkV1o3uMJI/maxresdefault.jpg"
                data-video="https://www.youtube.com/watch?v=ScjKijJWscE">
                Balamban
            </option>

            <option 
                value="11.2188,123.7285" data-name="Bantayan" data-tagline="Egg Basket of the Visayas"
                Established in 1580, Bantayan is one of the oldest Spanish settlements in the Philippines, though folklore suggests a civilization led by Sidumaguer existed over 2,000 years ago. Its name, meaning 'to keep watch,' stems from its history as a strategic lookout point against both Chinese and Moro maritime threats, protected by a network of eighteen watchtowers."
                data-items="Poultry Eggs, Danggit (Dried Fish), Centuries-old Church (Sts. Peter and Paul Parish)"
                data-img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTQfY4tFwSHL4sL6mH-y1DizhJs6mKSncn3og&s"
                data-video="https://www.youtube.com/watch?v=NlG1bGnJxrw&list=RDNlG1bGnJxrw&start_radio=1">
                Bantayan
            </option>

            <option 
                value="10.1165,123.5087" data-name="Barili" data-tagline="Cebu's First Heritage-Protected Municipality"
                data-history="Founded in 1632 and named after the 'balili' grass, Barili is a cornerstone of Cebuano history. It is home to a cross erected by conquistadores in 1602 and was the site of Chief Justice José Abad Santos’ capture in 1942. In 2006, it made history as the first Cebuano municipality to pass a comprehensive heritage protection ordinance for its ancestral properties."
                data-items="Mantayupan Falls, Molave Milk Station, Torta de Barili, Ancestral Houses"
                data-img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQzBkzuVEckbo1PH5WPgjvqyzAclSP57yyxcQ&s"
                data-video="https://www.youtube.com/watch?v=6x69p_DBOzA">
                Barili
            </option>

            <option 
                value="11.0517,124.0055" data-name="Bogo City" data-tagline="Gateway to Northern Cebu."
                data-history="Named after a lone Bogo tree that served as a 17th-century bartering post, Bogo evolved from a trade wharf into a vital sugar hub by the 1920s. After a landmark legal struggle for cityhood (2007–2013), it stands as a resilient northern center that has overcome the trials of Typhoon Yolanda and the devastating 2025 earthquake."
                data-items="Pintos, Sugarcane, Bogo Wharf (Polambato Port)"
                data-img="https://upload.wikimedia.org/wikipedia/commons/thumb/1/16/Capitancillo_Island_-_Tower_-_Southwest_Side_3.jpg/500px-Capitancillo_Island_-_Tower_-_Southwest_Side_3.jpg"
                data-video="https://www.youtube.com/watch?v=z3H1aBvf7OM">
                Bogo City
            </option>

            <option 
                value="9.62866,123.4799" data-name="Boljoon" data-tagline="The Heritage Frontier of the South"
                data-history="Founded as an Augustinian parish in 1599, Boljoon is a premier heritage landmark home to the Patrocinio de Maria Church, a National Historical Treasure built in 1783. Under Fr. Julián Bermejo, the town became the nerve center of a vast maritime defense system, and in 2025, it celebrated the historic return of its stolen 18th-century pulpit panels."
                data-items="Boljoon Church, Eli Rock, Heritage Trail"
                data-img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfr-8qq7umeqJiF1dlNTUXhnL3_6pOD7UF9A&s"
                data-video="https://www.youtube.com/watch?v=IBQaChYnYRg">
                Boljoon
            </option>

            <option 
                value="10.1048,123.6415" data-name="Carcar City" data-tagline="The Heritage City of Cebu"
                data-history="Formerly the pre-colonial district of Sialo ruled by the descendants of Sri Lumay, Carcar was established as a Spanish town in 1599 and remains one of Cebu's most significant cultural landmarks. The city earned international historical fame in 1944 when local residents recovered the 'Koga Papers,' a discovery that proved vital to General MacArthur’s strategy for the liberation of the Philippines."
                data-items="Carcar Lechon, Chicharon, Ampao, Shoes"
                data-img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTSVaDrrPAFK6dnSlhkS33mI55WPA72_SyjgQ&s"
                data-video="https://www.youtube.com/watch?v=FksSJ8PUie8">
                Carcar City
            </option>

            <option 
                value="10.5842,124.0170" data-name="Carmen" data-tagline="The Town of Bugho and the Lady of Carmel"
                data-history="Formerly known as Bugho, Carmen became a municipality on June 16, 1851, through the efforts of Facundo Buot and was later renamed in honor of Nuestra Señora del Carmen. This religious nomenclature reflects the town's deep Spanish-colonial roots and Catholic devotion, which is still celebrated through its vibrant Sinulog traditions."
                data-items="Mount Carmel Parish, Sinulog sa Carmen, Shem Hills, Cebu Safari"
                data-img="https://suroy.ph/wp-content/uploads/2022/06/carmenchurch.jpg"
                data-video="https://www.youtube.com/watch?v=qVAe4R07MIo">
                Carmen
            </option>

            <option 
                value="10.2926,124.0133" data-name="Catmon" data-tagline="The Home of the Budbod Kabog"
                data-history="Founded in 1835 and named after the Dillenia philippinensis trees, Catmon briefly merged with Sogod in 1903 before reclaiming its independent municipal status in 1921. The town remains a spiritual and cultural center dedicated to its patron, St. William the Hermit, celebrated through the annual Budbod Kabog Festival."
                data-items="Budbod Kabog, Katmon Tree, Esoy Hot Spring"
                data-img="https://live.staticflickr.com/5349/6911365990_1c59585d86_b.jpg"
                data-video="https://www.youtube.com/watch?v=AdUld9eiYnA">
                Catmon
            </option>

            <option 
                value="10.2926,123.9022" data-name="Cebu City" data-tagline="The Queen City of the South"
                data-history="Cebu City is the oldest city in the Philippines, established by the Spanish in 1565 after the arrival of Miguel López de Legazpi. It serves as the primary gateway and economic hub of the Visayas region, blending deep colonial roots with modern commercial significance"
                data-items="Magellan's Cross, Fort San Pedro, Sinulog, Dried Mangoes"

            </option>

            <option 
                value="10.4541,124.0130" data-name="Compostela" data-tagline="The Sanctuary of St. James the Great"
                data-history="Established as a barrio of Danao in 1844, Compostela regained its independence in 1919 following a brief 1903 merger with Liloan. During World War II, it served as a major resistance stronghold, notably hosting the Battle of Guila-guila and serving as the site where Cebu Governor Hilario Abellana was captured in 1944."
                data-items="St. James the Great Parish, Estaca Bay, Q-Park"
                data-img="https://dynamic-media-cdn.tripadvisor.com/media/photo-o/0f/1b/43/d1/photo0jpg.jpg?w=400&h=-1&s=1"
                data-video="https://www.youtube.com/watch?v=B_9-gJRPgK8">
                Compostela
            </option>

            <option 
                value="10.3758,123.9569" data-name="Consolacion" data-tagline="The Sarok Capital of Cebu"
                data-history="Originally a Mandaue barrio named 'Kampi-ig' after local mangrove crabs, Consolacion became an independent town in 1871 and was permanently re-established in 1920. The municipality was named in honor of Governor Manuel Roa's daughter, while its patron, San Narciso, was chosen as the namesake of his wife, Narcisa."
                data-items="Sarok Hats, San Narciso Parish, SM City Consolacion"
                data-img="https://media.assettype.com/sunstar%2Fimport%2Fuploads%2Fimages%2F2023%2F06%2F06%2F439876.jpg"

                Consolacion
            </option>

            <option 
                value="10.25056,123.94931" data-name="Cordova" data-tagline="The Bakasi Capital of Cebu"
                data-history="Created by Governor General Rafael Echagüe y Bermingham on May 22, 1863, Cordova was likely named after the Spanish province he previously represented in Congress. The municipality, comprising the barrios of Gabi, Day-as, and Pilipog, officially saw its decree take effect in 1864 and has been governed by fifteen mayors since 1913."
                data-items="Bakasi, 10,000 Roses, CCLEX, Lantaw Floating Restaurant, Gilutongan Marine Sanctuary"
                data-img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQKKNLejp_OTH-fnSlGwj6m3pSk3_fY9yIvqQ&s"

                Cordova
            </option>

            <option 
                value="11.2508,124.0013" data-name="Daanbantayan" data-tagline="The Gateway to Malapascua"
                data-history="The town's name is derived from the Cebuano words for 'old lookout,' referencing its historical role as a coastal defense point against Moro raiders during the pre-Hispanic era. While it stands today as a premier tourism hub, the community remains a testament to resilience following the severe impact of Super Typhoon Yolanda in 2013."
                data-items="Malapascua Island, Haladaya Festival, Tapilon Point"
                data-img="https://upload.wikimedia.org/wikipedia/commons/4/40/St._Rose_of_Lima_Parish_Church_in_Daanbantayan%2C_Cebu.jpg"

                Daanbantayan
            </option>

            <option 
                value="9.7620,123.5333" data-name="Dalaguete" data-tagline="Vegetable Basket and Summer Capital of Cebu"
                data-history="Named after the sacred 'dalakit' tree where pre-colonial natives gathered for trade and worship, the town was formally organized as a Spanish settlement in the 18th century. Today, it is celebrated for its cool highland climate and its status as the province's premier agricultural hub, supplying the majority of Cebu's fresh produce."
                data-items="Osmeña Peak, Dalakit Tree, Mantalongon Market, Utanon Festival"

                Dalaguete
            </option>

                value="10.5201,124.0271" data-name="Danao City" data-tagline="The Gun-making Capital of the North"
                data-history="Established in 1844 by Captain Manuel Anecito del Rosario, Danao’s name originated from a linguistic misunderstanding of the Cebuano word 'danawan,' meaning pond. It was officially inaugurated as a city on June 7, 1961, and today serves as the northern boundary of Metro Cebu and a historic center for industrial craftsmanship."

                data-history="Established as a municipality in 1855, Dumanjug's name is popularized by the legend of a tuba gatherer named Duman who reportedly fell from a coconut tree. Historically, it is celebrated as a cradle of Cebuano leadership, having produced influential political figures from the prominent Garcia and Jakosalem dynasties."

            <option 
                value="10.3993,124.0000" data-name="Liloan" ddata-tagline="The Light of the North"
                data-history="Named after the 'lilo' or whirlpools found at Silot Bay, Liloan was established as a parish and municipality in 1845. It is historically significant as the home of the Bagacay Point Lighthouse, originally lit in 1857, and the birthplace of the world-famous Titay’s Rosquillos, which were named by President Sergio Osmeña in 1907."
                data-items="Bagacay Point Lighthouse, San Fernando Rey Parish, Titay's Rosquillos, Pier 88"
                data-img="https://magazine.foodpanda.ph/wp-content/uploads/sites/22/2016/06/1728634.jpg"
                data-video="https://www.youtube.com/watch?v=Rz8EUd8C738">
                Liloan
            </option>

            <option 
                value="10.3127,123.9488" data-name="Lapu-Lapu City" data-tagline="The Historic Resort City"
                data-history="Formerly the town of Opon, it was renamed in 1961 to honor Datu Lapu-Lapu, who defeated Ferdinand Magellan in the 1521 Battle of Mactan. Today, it serves as a global gateway through the Mactan-Cebu International Airport and is the heart of the Philippines' high-end resort and guitar-making industries."
                data-items="Mactan Shrine, Mactan-Cebu International Airport, Alegre Guitars, Cebu-Cordova Link Expressway (CCLEX)"
                data-img="https://cebuinsights.com/wp-content/uploads/2021/07/Mactan-Shrine-1.webp"
                data-video="https://www.youtube.com/watch?v=r_aq6lJrwto&list=RDr_aq6lJrwto&start_radio=1">
                Lapu-Lapu City
            </option>

            <option 
                value="11.2957,123.7309" data-name="Madridejos" data-tagline="Little Alaska of the Philippines"
                data-history="Historically known as 'Lawis,' the town features the Kota, a defensive fort established as early as the 1630s to protect residents from maritime raiders. It was renamed in 1917 to honor Archbishop Benito Romero de Madridejos and remains the primary seafood hub of northern Cebu."
                data-items="Kota Park, Lawis Point, Bantayan Danggit, Scallops"
                data-img="https://isogdaily.com/wp-content/uploads/2023/11/Main.jpg"
                data-video="https://www.youtube.com/watch?v=iCp3eVdI8Eg">
                Madridejos
            </option>

            <option 
                value="9.6519202,123.3245598" data-name="Malabuyoc" data-tagline="The Home of the Mainit Springs"
                data-history="Officially separated from Samboan in 1832, Malabuyoc's name stems from the Cebuano word 'buyoc,' describing how its fruit-laden branches once bent toward the fertile earth. The town is a sanctuary of natural wonders, most notably the volcanic Mainit Hot Springs and the cascading Montañeza Falls, which define its reputation as a premier eco-tourism destination."
                data-items="Mainit Hot Springs, Montañeza Falls, San Nicolas de Tolentino Parish"
                data-img="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Malabuyoc_Church_01.jpg/1280px-Malabuyoc_Church_01.jpg"
                data-video="https://www.youtube.com/watch?v=0YMRkOHjhxI">
                Malabuyoc
            </option>

            <option 
                value="10.3245,123.9428" data-name="Mandaue City" data-tagline="Furniture Capital of the Philippines"
                data-history="Originating from the 'mantawi' vine that once thrived along its cove, Mandaue was established as a Jesuit mission in the early 1600s. It was officially chartered as a city on June 21, 1969, and has since become the industrial heart of Cebu, renowned globally for its world-class furniture craftsmanship."
                data-items="National Shrine of St. Joseph, Mactan-Cebu Bridges, J Centre Mall, Bibingka sa Mandaue"
                data-img="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/The_National_Shrine_of_St._Joseph%2C_Mandaue%2C_Cebu%2C_Jan_2024.jpg/330px-The_National_Shrine_of_St._Joseph%2C_Mandaue%2C_Cebu%2C_Jan_2024.jpg"
                data-video="">
                Mandaue City
            </option>

            <option 
                value="11.1286,123.9622" data-name="Medellin" data-tagline="The Sugar Capital of Cebu"
                data-history="Established as a municipality in 1881, Medellin was named after a town in Spain by Spanish officials. It evolved into the province's primary sugar producer following the establishment of the Bogo-Medellin Milling Company (Bomedco) in 1928, which transformed the local economy into a vast landscape of sugarcane plantations."
                data-items="Gibitngil Island (Funtastic Island), Medellin Dockside, Mercedes Village & Golf Course, Bamboo Forest"
                data-img="https://i.ytimg.com/vi/3HLmX41g_04/maxresdefault.jpg"
                data-video="https://www.youtube.com/watch?v=G_EY0wVRKyw&list=RDG_EY0wVRKyw&start_radio=1">
                Medellin
            </option>

            <option 
                value="10.2454,123.7960" data-name="Minglanilla" data-tagline="The Sugat Capital of the South"
                data-history="Established as a parish in 1857 by Fr. Sanchez, Minglanilla was named by Spanish friars after the town of Minglanilla in Cuenca, Spain. Historically a strategic agricultural gateway between Cebu City and the south, it is now a bustling residential and commercial center, world-famous for its 'Sugat' (Encounter) festival every Easter Sunday."
                data-items="Immaculate Heart of Mary Parish, Sugat Kabanhawan Festival, Camp 7 (Osmeña Reforestation Project), Anjo World Theme Park"
                data-img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRcBasSRP9NPS867vlzHWQOhl5aaEo0jMGzMw&s"

                Minglanilla
            </option>

            <option 
                value="9.9381,123.3931" data-name="Moalboal" data-tagline="Dagway sa Paraiso (The Face of Paradise)"
                data-history="Established as a parish in 1852, Moalboal was founded by Laurente Sabanal (Laguno), a native of Bohol. Its name is derived from 'Bocal-bocal,' an onomatopoeia for the bubbling freshwater springs found along its shore. Today, it is an internationally recognized center of diving excellence and marine biodiversity."
                data-items="Sardine Run (Panagsama), Pescador Island, Basdako White Beach, San Juan Nepomuceno Church Ruins, Turtle Point"
                data-img="https://islanddiariesph.com/wp-content/uploads/2024/06/145-1-1-636x426.jpg"
                data-video="https://www.youtube.com/watch?v=VOV0ODvbNa0">
                Moalboal
            </option>

            <option 
                value="10.2076,123.7582" data-name="Naga City" data-tagline="The Industrial Hub of Southern Cebu"
                data-history="Founded as a pueblo on June 12, 1829, Naga derives its name from the abundant Narra (Naga) trees that once lined its coast. Historically an agricultural town, the 19th-century discovery of coal sparked an industrial transformation, leading to the establishment of the Apo Cement factory and the KEPCO-SPC power plant, making it a critical infrastructure center for the province."
                data-items="Naga City Boardwalk & Marine Park, St. Francis of Assisi Parish, Mount Mabogo Ridge, KEPCO-SPC Power Plant, Apo Cement Corporation"
                data-img="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/City_of_Naga_Cebu_Hall.jpg/640px-City_of_Naga_Cebu_Hall.jpg"
                data-video="https://www.youtube.com/watch?v=5ss_Z38xSTc">
                Naga City
            </option>

            <option 
                value="9.5208,123.4335" data-name="Oslob" data-tagline=" Whale Shark Capital of Cebu"
                data-history="Founded in 1848, Oslob was a critical link in the defensive chain against maritime invaders, led by the legendary Father Julian Bermejo. Its name is derived from 'toslob' (to dip), from a story of a local dipping food into vinegar. Today, it balances its role as a premier marine sanctuary with its status as a bastion of Spanish-colonial architecture."
                data-items="Cuartel Ruins, Immaculate Conception Parish, Baluarte (Watchtower), Whale Shark Watching, Sumilon Island, Tumalog Falls"
                data-img="https://static.vecteezy.com/system/resources/previews/038/007/907/large_2x/cuartel-ruins-museo-oslob-at-oslob-in-cebu-island-philippines-photo.jpg"
                data-video="https://www.youtube.com/watch?v=Ayac6AuDKjE&list=RDAyac6AuDKjE&start_radio=1">
                Oslob
            </option>

            <option 
                value="10.8065,124.5629" data-name="Pilar" data-tagline="Ponson, Island Paradise of Camotes"
                data-history="Formerly known as 'Posong,' Pilar is the only municipality on Ponson Island. It was officially separated from the town of Poro in 1859. Named after a beloved local figure, the town has transitioned from a defensive outpost against raiders to a premier model for community-based marine conservation in the Visayas."
                data-items="Pilar Municipal Marine Park (PMMP), Cawit Port, Naukban Lagoon, Guiwanon Cave, Solferino Borinaga Monument"
                data-img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQhx2g_iIPE5eTssILD5d3PkRFkJUwa624Gsg&s"
                data-video="https://www.youtube.com/watch?v=i_7Qqp0Asi8">
                Pilar
            </option>

            <option 
                value="10.2666656,123.583331" data-name="Pinamungajan" data-tagline="Jewel in the Midst of Midwest Cebu"
                data-history="Established as a parish in 1850, its name comes from 'Pinamuhuan,' the share given to laborers during harvest. It is the birthplace of the Lamac Multi-Purpose Cooperative (LMPC), which transformed the rugged Lamac Valley into a national model for rural development and cooperative success."
                data-items="Hidden Valley Mountain Resort, Udlom Falls, Sta. Monica Parish Church, Pinamungajan Public Plaza, Tajao Beach, Lamac Valley"
                data-img="https://lh3.googleusercontent.com/proxy/EGVjnSz3sFtCiABsIOK1I-Um8tPI2VGbnGA5oPI0qVzmpfJbrurFLqQUdN91c-_P1B3sr_Mdlmut6_1z38k80evM"
                data-video="https://www.youtube.com/watch?v=CjhDlmZOxnw">
                Pinamungajan
            </option>

            <option 
                value="10.629,124.407" data-name="Poro" data-tagline="The Mother Town of Camotes"
                data-history="Founded in 1701, Poro is the oldest municipality in the Camotes Islands and served as the administrative and religious center of the archipelago for centuries. It was born from a peace pact between the tribes of Maktang and Tag-anito. It is the only place in the world where the unique Porohanon language is natively spoken."
                data-items="Sto. Niño de Poro Parish, Buho Rock Resort, Tagbo Festival, Maktang Beach, Altavista Viewpoint, Pagsa Eco-Adventure Park"
                data-img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT5EN-JC1IrlUBwUDNwNGTLb97uLCozVs776g&s"
                data-video="https://www.youtube.com/watch?v=z7UJsZTheno">
                Poro
            </option>

            <option     
                value="10.00025,123.41129" data-name="Ronda" data-tagline="The Humba Capital of Cebu"
                data-history="Originally called 'Huluyaw' after a type of banana once abundant in the area, the town was renamed 'Ronda' by Spanish colonizers after the city in Málaga, Spain, which is similarly flanked by highlands. Founded by the native chief Pongtod (who later adopted the name Villagonzalo), it was officially established as a municipality in 1779 and remains a bastion of traditional Cebuano flavors."
                data-items="Lusno Falls, Ronda Wharf (Embarcadero), Our Lady of Sorrows Parish, Humba Festival, Marine Sanctuary of Barangay Liboo, Les Maisons d'Itac"
                data-img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSDAyCJa8sJyD5fGaqQ9XHF_tDatEqE2pmf_g&s"
                data-video="https://www.youtube.com/watch?v=AL4FM0H9xBQ&list=RDAL4FM0H9xBQ&start_radio=1">
                Ronda
            </option>

            <option 
                value="9.528753,123.306431" data-name="Samboan" data-tagline="The Waterfall Capital of Cebu"
                data-history="Formerly known as 'Canumbohan' (from the word 'sambo' or 'canumbo', a fishing method), Samboan was established as a parish in 1794. It served as a critical coastal defense point, featuring the 147-step Jacob's Ladder. Today, it is the premier destination for waterfall trekking in the south, balancing its rich colonial history with pristine natural conservation."
                data-items="Aguinid Falls, Dau Falls, Binalayan (Hidden) Falls, Jacob's Ladder (Escala de Jacob), St. Michael the Archangel Church, Campanario de Samboan, Ponong Lake"
                data-img="https://suroy.ph/wp-content/uploads/2024/06/samboanchurch-3.jpg"
                data-video="https://www.youtube.com/watch?v=R0wN6bZ_G14">
                Samboan
            </option>

            <option 
                value="10.1632,123.7074" data-name="San Fernando" data-tagline="Home of the Sikoy-Sikoy Festival"
                data-history="Established by Royal Decree in 1858 after separating from Naga, San Fernando was originally centered in Pitalo. It was named in honor of its first parish priest, Fr. Fernando Sanchez. Historically a vital sugar-producing town, it has evolved into a major industrial hub while maintaining its cultural status as the primary center for the production and artistry of 'Puso' (hanging rice)."
                data-items="San Isidro Labrador Parish Church, Hidden Paradise Mountain Resort, San Fernando Public Market (Puso Hub), Sangat Cave, Bugho Elevation, Pitalo Church Ruins"
                data-img="https://upload.wikimedia.org/wikipedia/commons/8/81/Facade_of_San_Fernando_Church_in_Cebu_province.jpg"
                data-video="https://www.youtube.com/watch?v=H2YZTmt1RVY&list=RDH2YZTmt1RVY&start_radio=1">
                San Fernando
            </option>

            <option 
                value="10.6466,124.3812" data-name="San Francisco" data-tagline="The Tourism Hub of Camotes"
                data-history="Established as a parish in 1863 after its 1860 beginnings as a 'visita' of Bantayan, San Francisco is the sole municipality on Pacijan Island and also encompasses Tulang Island. Named after St. Francis of Assisi, the town sits at the heart of the archipelago's history—named 'Camotes' by Spanish explorers who mistook the local crop (sweet potatoes) for the name of the land. It remains the economic engine of the islands, linked to Poro by a historic 1.5-km mangrove causeway."
                data-items="Lake Danao (Lover's Lake), Santiago Bay, Mangodlong Beach, Timubo Cave, Baywalk (Poblacion), Paraiso Cave, Tulang Diot Islet"
                data-img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS-t1uil89miMRqab4p_WW9dBAjUP1WNu50Jg&s"
                data-video="https://www.youtube.com/watch?v=p-jkp9j4XIs">
                San Francisco
            </option>

            <option 
                value="11.0810,123.9365" data-name="San Remigio" data-tagline="The Longest Shoreline in Cebu"
                data-history="Established as a town by Superior Decree on November 21, 1863 (briefly known as Isabel II), San Remigio was originally the settlement of 'Kanghagas,' named after local Hagas trees. It served as a visita of Bantayan and a part of Bogo before its independence. It is famed for having the longest shoreline in Cebu province and serves as the vital maritime gateway to the Bantayan archipelago via Hagnaya Port."
                data-items="Hagnaya Port, Lapyahan Public Beach, San Juan Nepomuceno Church, San Remigio Beach Club, Orongan Beach (Anapog), Caputatan Marine Sanctuary"
                data-img="https://upload.wikimedia.org/wikipedia/commons/1/17/Church_of_San_Remigio%2C_Cebu.jpg"
                data-video="https://www.youtube.com/watch?v=rWIlaqXCGIw">
                San Remigio
            </option>

            <option 
                value="11.1537,123.8034" data-name="Santa Fe" data-tagline="The Beach Capital of Bantayan"
                data-history="Established as an independent 'pueblo' by decree in October 1872, Santa Fe was formerly a barrio of Bantayan known as 'Ogtong.' The name is derived from 'Kogtong,' a species of grouper fish once abundant in its limestone-rich waters. It serves as the primary maritime gateway to Bantayan Island and is the archipelago's tourism heart, famed for its expansive white-sand beaches and coralline karst landscape featuring unique freshwater sinkholes."
                data-items="Sugar Beach, Paradise Beach (Sandira), Ogtong Cave, Balidbid Lagoon, Virgin Island (Silion), Hilantagaan Island (Heligoon), Kota Beach"
                data-img="https://pix10.agoda.net/hotelImages/66087665/0/458aa7dd312fc0bdad109f537b07cbc7.png?ce=0&s=414x232"
                data-video="https://www.youtube.com/watch?v=ugpCOimiTVA">
                Santa Fe
            </option>

            <option 
                value="9.4170689,123.3351935" data-name="Santander" data-tagline="Home of the Tostado Festival"
                data-history="Established as an independent municipality in 1867, Santander was originally a barrio of Oslob known as 'Taongon.' It was renamed after the Spanish port city of Santander. While it remains the vital maritime link between Cebu and Negros Oriental, the town's identity is deeply rooted in the 'Tostado'—a traditional local cookie that has been its signature delicacy for over a century."
                data-items="Liloan Port (Gateway to Dumaguete), Marine Village, Pebble Beach, St. Gabriel the Archangel Parish, Tostado Festival, Gun-ob Beach"
                data-img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR30gnv64iMlwsDpgkIh8iEqd-gdtIc8Pv7oQ&s"
                data-video="https://www.youtube.com/watch?v=xOlt7ExffUY">
                Santander
            </option>

            <option 
                value="10.0155,123.6179" data-name="Sibonga" data-tagline="Blissful Sibonga"
                data-history="Established as an independent parish in 1830 after separating from Carcar, Sibonga's name is derived from the 'Bonga' (Betel Nut) tree. It was a primary coastal trading hub during the Spanish era, characterized by its iconic acacia-lined highway and colonial-era 'poblacion.' Today, it is the premier pilgrimage center of Cebu, home to the Simala Shrine and the cultural 'Pastores de Sibonga' tradition."
                data-items="Monastery of the Holy Eucharist (Simala Shrine), Nuestra Señora del Pilar Parish Church, Sibonga Town Plaza, Pastores de Sibonga, Sibonga Heritage Houses, Bunga Caves"
                data-img="https://islanddiariesph.com/wp-content/uploads/2024/09/simala-shrine.jpg"
                data-video="https://www.youtube.com/watch?v=yC64gvXLlpY">
                Sibonga
            </option>

            <option 
                value="10.7495,124.0037" data-name="Sogod" data-tagline="Home of the Binaliw Spring"
                data-history="With civil roots dating to 1764 and parish status granted in 1832, Sogod takes its name from 'Sinugdanan' (the beginning). It is the geographic marker where Cebu’s dark volcanic sands transition into northern white coralline shores. It is historically significant for the Binaliw Spring in Barangay Bagatayam, which powered a pre-war hydraulic plant and remains a site of spiritual healing."
                data-items="Binaliw Spring (Bagatayam), Bagatayam Falls, Santiago Apostol Church, Calumboyan Public Beach, Alegre Beach Resort, Handayan Islet"
                data-img="https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Sogod_Cebu_2-cr.jpg/500px-Sogod_Cebu_2-cr.jpg"
                data-video="https://www.youtube.com/watch?v=VhL68eM0IEA">
                Sogod
            </option>

            <option 
                value="10.9403,124.0274" data-name="Tabogon" data-tagline="The Home of the Sanggi Festival"
                data-history="Founded as a town in 1827 and established as a parish on August 6, 1851, Tabogon was originally known as 'Agoho' after its abundant Casuarina trees. Its current name is derived from 'Tabogon' (to be driven away), referring to the historical flight of coastal residents to the hills during maritime raids. Today, it is an agricultural powerhouse celebrated for its 'Sanggi' (harvest) traditions and unique limestone-filtered cold springs."
                data-items="Guiwanon Cold Spring, Banyan Springs (Badiang), Salag Mangrove Park, San Isidro Labrador Church, Bitoon Gamay, Nipa Beach"
                data-img="https://upload.wikimedia.org/wikipedia/commons/3/35/Church_of_Tabogon%2C_Cebu.jpg"
                data-video="https://www.youtube.com/watch?v=VhyExzrQiF0">
                Tabogon
            </option>

            <option     
                value="10.8243,123.8707" data-name="Tabuelan" data-tagline="Home of the Ani-anihan Festival"
                data-history="Tabuelan became an independent municipality on September 23, 1953, through Executive Order No. 621, having been separated from Tuburan. Its name is believed to come from 'taboan,' meaning a marketplace or trading center, reflecting its early role as a hub for commerce and travelers. Today, it is a 4th-class municipality known for its eco-tourism attractions, pristine beaches, and relaxed coastal environment on Cebu’s northwestern shore."
                data-items="Maravilla Beach, Tabuelan Public Beach, Gumbang Cold Spring, Tabuelan Port (Escalante Route), St. John the Baptist Parish Church, Bamboo Boardwalk"
                data-img="https://nikdottravel.wordpress.com/wp-content/uploads/2019/02/maravilla1.jpeg"
                data-video="https://www.youtube.com/watch?v=LlP5G-AGO-Y">
                Tabuelan
            </option>

            <option 
                value="10.2446,123.8473" data-name="Talisay City" data-tagline="Lechon Capital of Cebu"
                data-history="Founded in 1648 as an estate of the Augustinians, Talisay became a municipality in 1849 and was later converted into a component city on December 30, 2000, through Republic Act No. 8979. Its name is believed to be derived from the 'talisay' trees that once grew abundantly in the area. The city played a pivotal role during World War II as the landing site of the American liberation forces on March 26, 1945. Today, it is widely known as the 'Lechon Capital of Cebu' and for its vibrant Halad Inasal Festival."
                data-items="Talisay Landing Site (Liberation Park), Sta. Teresa de Avila Church, Crocolandia Foundation, Lechon"
                data-img="https://upload.wikimedia.org/wikipedia/en/4/44/Talisay_City_Hall_and_Plaza_%28CSCR%2C_Talisay%2C_Cebu%3B_09-07-2022%29.jpg"
                data-video="https://www.youtube.com/watch?v=rm0N4LOGA0c">
                Talisay City
            </option>

            <option 
                value="10.3755,123.6360" data-name="Toledo City" data-tagline="Copper City with a Heart of Gold"
                data-history="Home to Atlas Mining, one of Asia's largest copper mines. It is a major port connecting Cebu to Negros Island."
                data-history = "Originally the settlement of Pueblo Hinulawan, it was renamed Toledo in 1869 and inaugurated in 1870. It achieved cityhood on June 19, 1960 (RA 2688). It is globally recognized as the home of Atlas Mining, once the largest copper mine in the Far East. Today, Toledo is a vital industrial powerhouse and the primary logistics gateway connecting Cebu to San Carlos City, Negros Occidental."
                data-items = "Capilla Santa Ana (Museum & Labyrinth), Hinulawan Festival, Biga Pit, Cantabaco Climbing Crags, Malubog Lake, The Maze at Lakeview, Toledo City Port"

                Toledo City
            </option>

            <option 
                value="10.7275,123.8252" data-name="Tuburan" data-tagline="Gem of the Midwest Cebu"
                data-history="Founded in 1851, Tuburan is one of the oldest municipalities in northern Cebu. Its name is derived from the word 'tubod' or 'tuburan,' meaning spring or source of water, referring to the many natural springs found in the area. It was once the mother town of several municipalities, including Tabuelan. Today, Tuburan is known for its agricultural heritage, scenic highlands, and emerging eco-tourism destinations."
                data-items="Molobolo Spring, Mantawihan Festival, Tuburan 360 Resto & View Deck, Marmol Cliff, Alegria Beach (Barangay Putat), Tuburan Public Market"
                data-img="https://www.bisayatraveler.com/wp-content/uploads/2020/03/2020-02-24-10.20.19-1.jpg"
                data-video="https://www.youtube.com/watch?v=AgyDzLH4v0Q">
                Tuburan
            </option>

            <option 
                value="10.6367,124.4694" data-name="Tudela" data-tagline="Home of the Katunggan Festival"
                data-history="Originally known as 'Tag-anito'—a reference to early villagers' worship of spirits—it was an agricultural hub famous for rice production. It was declared a separate town from Poro on May 20, 1892, by decree of Governor-General Eulogio Despujol. In August 1892, at the invitation of Fr. Ramon Agirres, it was renamed 'Tudela' after the Spanish province of the same name. It is celebrated today for its 'Enchanted' landscape, featuring rare island waterfalls and the majestic Bukilat Cave."
                data-items="Bukilat Cave, Taghubas Falls, Busay Falls, Pagatpat Mangrove Forest, Immaculate Conception Parish, Tudela Marine Sanctuary"
                data-img="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT88iF3AebxU08XMMK4Rx3BdtkF45e2_o4bUw&s"

    <script>
        // Initialize Map centered on Cebu
        const map = L.map('map').setView([10.3157, 123.8854], 10);

        // Add Map Tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        const citySelector = document.getElementById('citySelector');
        const infoCard = document.getElementById('infoCard');
        let currentMarker = null;

        citySelector.addEventListener('change', function () {
            const val = this.value;
            if (!val) {
                infoCard.style.display = 'none';
                return;
            }

            // 1. Extract Data from Attributes
            const coords = val.split(',').map(Number);
            const selected = this.options[this.selectedIndex];
            const name = selected.getAttribute('data-name');
            const tagline = selected.getAttribute('data-tagline');
            const history = selected.getAttribute('data-history');
            const items = selected.getAttribute('data-items').split(',');
            const imgSrc = selected.getAttribute('data-img');
            const videoUrl = selected.getAttribute('data-video');
            // 2. Zoom Map & Place Marker
            map.flyTo(coords, 15, { animate: true, duration: 1.5 });

            if (currentMarker) map.removeLayer(currentMarker);
            currentMarker = L.marker(coords).addTo(map).bindPopup(`<b>${name}</b>`).openPopup();

            // 3. Update Card Content
            document.getElementById('cardTitle').innerText = name;
            document.getElementById('cardTagline').innerText = tagline;
            document.getElementById('cardHistory').innerText = history;
            document.getElementById('cardMedia').innerHTML = `<img src="${imgSrc}" alt="${name}">`;
            document.getElementById('videoLink').href = videoUrl;
            // 4. Update Tags
            const tagsDiv = document.getElementById('cardTags');
            tagsDiv.innerHTML = ''; // Clear old tags
            items.forEach(item => {
                const span = document.createElement('span');
                span.className = 'tag';
                span.innerText = item;
                tagsDiv.appendChild(span);
            });

            // 5. Show the Card
            infoCard.style.display = 'block';
        });
    </script>
</body>
</html>
