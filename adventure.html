<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventure Game</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .game-cards {
            display: flex;
            gap: 20px;
        }

        .card-link {
            text-decoration: none;
        }

        .card {
            width: 150px;
            padding: 20px;
            background: #222;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
            background: #333;
        }

        .card h2 {
            margin: 0 0 10px;
        }
    </style>

</head>
<body>

    <div class="game-cards">

        <a class="card-link" href="/game/level1.html">
            <div class="card">
                <h2>Level 1</h2>
                <p>Pre-Colonial Era</p>
            </div>
        </a>

        <a class="card-link" href="level2.html">
            <div class="card">
                <h2>Level 2</h2>
                <p>Battle of Mactan</p>
            </div>
        </a>

        <a class="card-link" href="level3.html">
            <div class="card">
                <h2>Level 3</h2>
                <p>Secret</p>
            </div>
        </a>

    </div>

</body>
</html>
